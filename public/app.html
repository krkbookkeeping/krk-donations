<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KRK Donations</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/company.js"></script>
  <script type="module" src="js/shell.js"></script>
  <script type="module" src="js/donors.js"></script>
  <script type="module" src="js/donations.js"></script>
  <script type="module" src="js/categories.js"></script>
  <script type="module" src="js/paymentMethods.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body>
  <!-- Onboarding: shown when the signed-in user has no companies yet. -->
  <div class="app-shell onboarding" x-data="onboarding" x-cloak x-show="show">
    <main class="onboarding-card">
      <h1>Welcome to KRK Donations</h1>
      <p class="muted">Before you can start tracking donations, create a company. You can add more later from the company switcher.</p>
      <label>
        Company name
        <input type="text" x-model="name" :disabled="submitting" placeholder="e.g. Hope Community Church" maxlength="200" @keydown.enter.prevent="submit">
      </label>
      <p class="error" x-show="error" x-text="error"></p>
      <button @click="submit" :disabled="submitting || !name.trim()">
        <span x-show="!submitting">Create Company</span>
        <span x-show="submitting">Creating…</span>
      </button>
    </main>
  </div>

  <!-- Main app shell: shown once the user has at least one company. -->
  <div class="app-shell" x-data="appShell" x-cloak x-show="show">
    <aside class="sidebar">
      <div class="brand">KRK Donations</div>
      <nav>
        <a href="#/donors" :class="{ active: route === 'donors' }">Donors</a>
        <a href="#/donations" :class="{ active: route === 'donations' }">Donations</a>
        <a href="#/categories" :class="{ active: route === 'categories' }">Categories</a>
        <a href="#/payment-methods" :class="{ active: route === 'payment-methods' }">Payment Methods</a>
        <a href="#/reports" :class="{ active: route === 'reports' }">Reports</a>
        <a href="#/receipts" :class="{ active: route === 'receipts' }">Receipts</a>
        <a href="#/settings" :class="{ active: route === 'settings' }">Settings</a>
      </nav>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="company-switcher">
          <template x-if="companies.length <= 1">
            <span class="company-name" x-text="activeCompanyName"></span>
          </template>
          <template x-if="companies.length > 1">
            <select @change="switchTo($event.target.value)">
              <template x-for="c in companies" :key="c.id">
                <option :value="c.id" :selected="c.id === activeCompanyId" x-text="c.name"></option>
              </template>
            </select>
          </template>
          <button class="link-button" @click="startNewCompany" title="Create a new company">+ New Company</button>
        </div>
        <span class="user-email" x-text="userEmail"></span>
        <button class="secondary" @click="signOut">Sign Out</button>
      </header>

      <section class="content">
        <!-- New company inline form -->
        <template x-if="creatingCompany">
          <div class="inline-company-form">
            <h2>New Company</h2>
            <label>
              Company name
              <input type="text" x-model="newCompanyName" :disabled="submittingCompany" maxlength="200" @keydown.enter.prevent="submitNewCompany">
            </label>
            <p class="error" x-show="newCompanyError" x-text="newCompanyError"></p>
            <div>
              <button @click="submitNewCompany" :disabled="submittingCompany || !newCompanyName.trim()">Create</button>
              <button class="secondary" @click="cancelNewCompany" :disabled="submittingCompany">Cancel</button>
            </div>
          </div>
        </template>

        <!-- ── Donors ─────────────────────────────────────────────────── -->
        <template x-if="!creatingCompany && route === 'donors'">
          <div x-data="donors">

            <!-- List view -->
            <template x-if="view === 'list'">
              <div>
                <div class="page-header">
                  <h1>Donors</h1>
                  <button @click="startCreate">+ New Donor</button>
                </div>
                <div class="filters-bar">
                  <input type="search" placeholder="Search donors…" x-model="searchQuery"
                         @input="onSearchInput" class="search-input">
                  <select x-model="statusFilter" @change="onFilterChange">
                    <option value="active">Active</option>
                    <option value="archived">Archived</option>
                    <option value="all">All</option>
                  </select>
                </div>
                <div x-show="loading && !donors.length" class="muted">Loading…</div>
                <div x-show="!loading && !donors.length" class="empty-state">No donors found.</div>
                <table x-show="donors.length > 0">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Email</th>
                      <th>Phone</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="donor in donors" :key="donor.id">
                      <tr class="clickable-row" @click="showDetail(donor)">
                        <td x-text="donorDisplayName(donor)"></td>
                        <td x-text="donor.email || '—'"></td>
                        <td x-text="donor.phone || '—'"></td>
                        <td><span class="badge" :class="donor.status" x-text="donor.status"></span></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
                <div x-show="hasMore" class="load-more">
                  <button class="secondary" @click="loadMore" :disabled="loading">
                    <span x-show="!loading">Load more</span>
                    <span x-show="loading">Loading…</span>
                  </button>
                </div>
              </div>
            </template>

            <!-- Detail view -->
            <template x-if="view === 'detail'">
              <div>
                <div class="page-header">
                  <div>
                    <button class="secondary small" @click="view = 'list'">&larr; Donors</button>
                    <h1 x-text="donorDisplayName(selected)" style="display:inline;margin-left:.5rem"></h1>
                    <span class="badge" :class="selected.status" x-text="selected.status"></span>
                  </div>
                  <div class="action-group">
                    <button @click="startEdit">Edit</button>
                    <button class="secondary" @click="startMerge">Merge</button>
                    <template x-if="selected.status === 'active'">
                      <button class="secondary danger" @click="archiveDonor">Archive</button>
                    </template>
                    <template x-if="selected.status === 'archived'">
                      <button class="secondary" @click="unarchiveDonor">Restore</button>
                    </template>
                  </div>
                </div>

                <div class="detail-grid">
                  <div class="detail-card">
                    <h3>Contact</h3>
                    <dl>
                      <template x-if="selected.firstName || selected.lastName">
                        <div><dt>Name</dt><dd x-text="(selected.firstName + ' ' + selected.lastName).trim()"></dd></div>
                      </template>
                      <template x-if="selected.orgName">
                        <div><dt>Organization</dt><dd x-text="selected.orgName"></dd></div>
                      </template>
                      <template x-if="selected.email">
                        <div><dt>Email</dt><dd><a :href="'mailto:' + selected.email" x-text="selected.email"></a></dd></div>
                      </template>
                      <template x-if="selected.phone">
                        <div><dt>Phone</dt><dd x-text="selected.phone"></dd></div>
                      </template>
                      <template x-if="selected.preferredContact && selected.preferredContact !== 'any'">
                        <div><dt>Preferred contact</dt><dd x-text="selected.preferredContact"></dd></div>
                      </template>
                    </dl>
                  </div>

                  <div class="detail-card" x-show="selected.address?.line1">
                    <h3>Address</h3>
                    <address>
                      <span x-text="selected.address?.line1"></span><br>
                      <span x-show="selected.address?.line2" x-text="selected.address?.line2"></span>
                      <span x-show="selected.address?.line2"><br></span>
                      <span x-text="[selected.address?.city, selected.address?.province].filter(Boolean).join(', ')"></span><br>
                      <span x-text="[selected.address?.postalCode, selected.address?.country].filter(Boolean).join(' ')"></span>
                    </address>
                  </div>

                  <div class="detail-card" x-show="selected.notes">
                    <h3>Notes</h3>
                    <p x-text="selected.notes" class="notes-text"></p>
                  </div>
                </div>

                <div class="detail-card" style="margin-top:1rem">
                  <div class="section-header">
                    <h3>Donations</h3>
                    <span class="muted" x-text="'YTD receiptable: ' + formatCents(ytdReceiptable)"></span>
                  </div>
                  <div x-show="loadingDonations" class="muted">Loading…</div>
                  <div x-show="!loadingDonations && !recentDonations.length" class="muted">No donations yet.</div>
                  <table x-show="recentDonations.length > 0" class="compact-table">
                    <thead><tr><th>Date</th><th>Amount</th><th>Payment</th></tr></thead>
                    <tbody>
                      <template x-for="don in recentDonations" :key="don.id">
                        <tr>
                          <td x-text="don.date"></td>
                          <td x-text="formatCents(don.totalAmountCents)"></td>
                          <td x-text="don.paymentMethodId"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </div>
            </template>

            <!-- Form view -->
            <template x-if="view === 'form'">
              <div class="form-page">
                <div class="page-header">
                  <h1 x-text="formMode === 'create' ? 'New Donor' : 'Edit Donor'"></h1>
                  <button class="secondary" @click="cancelForm">Cancel</button>
                </div>

                <!-- Duplicate warning -->
                <template x-if="duplicates.length > 0">
                  <div class="warning-card">
                    <strong>Possible duplicate(s) found:</strong>
                    <ul>
                      <template x-for="d in duplicates" :key="d.id">
                        <li>
                          <span x-text="donorDisplayName(d)"></span>
                          <span class="muted" x-text="' — ' + d.reason"></span>
                          <button class="link-button" @click="showDetail(d); view = 'detail'">View</button>
                        </li>
                      </template>
                    </ul>
                    <div>
                      <button class="secondary" @click="proceedDespiteDuplicates">Save anyway</button>
                      <button class="secondary" @click="duplicates = []">Review</button>
                    </div>
                  </div>
                </template>

                <div class="form-type-toggle">
                  <label>
                    <input type="checkbox" x-model="form.isOrg" role="switch">
                    Organization (not an individual)
                  </label>
                </div>

                <template x-if="!form.isOrg">
                  <div class="form-row">
                    <label>
                      First Name <span class="required">*</span>
                      <input type="text" x-model="form.firstName" :class="{ error: formErrors.firstName }">
                      <span class="field-error" x-show="formErrors.firstName" x-text="formErrors.firstName"></span>
                    </label>
                    <label>
                      Last Name <span class="required">*</span>
                      <input type="text" x-model="form.lastName">
                    </label>
                  </div>
                </template>
                <template x-if="form.isOrg">
                  <label>
                    Organization Name <span class="required">*</span>
                    <input type="text" x-model="form.orgName" :class="{ error: formErrors.firstName }">
                    <span class="field-error" x-show="formErrors.firstName" x-text="formErrors.firstName"></span>
                  </label>
                </template>

                <div class="form-row">
                  <label>
                    Email
                    <input type="email" x-model="form.email" :class="{ error: formErrors.email }">
                    <span class="field-error" x-show="formErrors.email" x-text="formErrors.email"></span>
                  </label>
                  <label>
                    Phone
                    <input type="tel" x-model="form.phone" :class="{ error: formErrors.phone }">
                    <span class="field-error" x-show="formErrors.phone" x-text="formErrors.phone"></span>
                  </label>
                </div>

                <details>
                  <summary>Address</summary>
                  <div style="margin-top:.5rem">
                    <label>Address line 1<input type="text" x-model="form.address.line1"></label>
                    <label>Address line 2<input type="text" x-model="form.address.line2"></label>
                    <div class="form-row">
                      <label>City<input type="text" x-model="form.address.city"></label>
                      <label>Province<input type="text" x-model="form.address.province" maxlength="2" placeholder="ON"></label>
                    </div>
                    <div class="form-row">
                      <label>Postal code<input type="text" x-model="form.address.postalCode"></label>
                      <label>Country<input type="text" x-model="form.address.country"></label>
                    </div>
                  </div>
                </details>

                <label>
                  Preferred contact
                  <select x-model="form.preferredContact">
                    <option value="any">Any</option>
                    <option value="email">Email</option>
                    <option value="phone">Phone</option>
                    <option value="mail">Mail</option>
                  </select>
                </label>

                <label>
                  Notes
                  <textarea x-model="form.notes" rows="3" maxlength="2000"></textarea>
                </label>

                <div class="form-actions">
                  <button @click="saveDonor" :disabled="saving">
                    <span x-show="!saving" x-text="formMode === 'create' ? 'Create Donor' : 'Save Changes'"></span>
                    <span x-show="saving">Saving…</span>
                  </button>
                  <button class="secondary" @click="cancelForm" :disabled="saving">Cancel</button>
                </div>
              </div>
            </template>

            <!-- Merge view -->
            <template x-if="view === 'merge'">
              <div>
                <div class="page-header">
                  <h1>Merge Donors</h1>
                  <button class="secondary" @click="cancelMerge">Cancel</button>
                </div>

                <!-- Step: select secondaries -->
                <template x-if="mergeStep === 'select'">
                  <div>
                    <p>Merging <strong x-text="donorDisplayName(selected)"></strong> (primary) with the donors you select below. All selected donors will be archived and their donations moved to the primary.</p>
                    <p class="muted">Click rows to toggle selection. The primary donor is highlighted.</p>
                    <table>
                      <thead><tr><th></th><th>Name</th><th>Email</th><th>Phone</th></tr></thead>
                      <tbody>
                        <template x-for="donor in donors" :key="donor.id">
                          <tr
                            :class="{
                              'merge-primary': donor.id === selected.id,
                              'merge-selected': isSecondary(donor),
                              'clickable-row': donor.id !== selected.id
                            }"
                            @click="donor.id !== selected.id && toggleSecondary(donor)"
                          >
                            <td>
                              <template x-if="donor.id === selected.id">
                                <span class="badge active">Primary</span>
                              </template>
                              <template x-if="donor.id !== selected.id">
                                <input type="checkbox" :checked="isSecondary(donor)" @click.stop="toggleSecondary(donor)">
                              </template>
                            </td>
                            <td x-text="donorDisplayName(donor)"></td>
                            <td x-text="donor.email || '—'"></td>
                            <td x-text="donor.phone || '—'"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                    <div class="form-actions">
                      <button @click="proceedToResolve" :disabled="mergeSecondaries.length === 0">
                        Review conflicts (<span x-text="mergeSecondaries.length"></span> selected)
                      </button>
                    </div>
                  </div>
                </template>

                <!-- Step: confirm (with conflict resolution) -->
                <template x-if="mergeStep === 'confirm'">
                  <div>
                    <template x-if="mergeConflicts.length > 0">
                      <div>
                        <h3>Resolve conflicting fields</h3>
                        <p class="muted">Choose which value to keep for each field where the donors differ.</p>
                        <template x-for="conflict in mergeConflicts" :key="conflict.key">
                          <div class="conflict-row">
                            <strong x-text="conflict.label"></strong>
                            <div class="conflict-options">
                              <template x-for="opt in conflict.options" :key="opt.donorId">
                                <label class="conflict-option" x-show="opt.value">
                                  <input type="radio" :name="'resolve-' + conflict.key" :value="opt.value"
                                         x-model="mergeResolutions[conflict.key]">
                                  <span class="opt-source muted" x-text="opt.name + ':'"></span>
                                  <span x-text="opt.value"></span>
                                </label>
                              </template>
                            </div>
                          </div>
                        </template>
                      </div>
                    </template>
                    <template x-if="mergeConflicts.length === 0">
                      <p class="muted">No conflicting fields — the donors' data is compatible.</p>
                    </template>

                    <div class="warning-card" x-show="mergeDonations > 0">
                      <strong x-text="mergeDonations + ' donation(s) will be reassigned'"></strong> from the selected donors to <span x-text="donorDisplayName(selected)"></span>.
                    </div>

                    <p class="error" x-show="mergeError" x-text="mergeError"></p>

                    <div class="form-actions">
                      <button @click="executeMerge" :disabled="merging" class="danger">
                        <span x-show="!merging">Confirm Merge</span>
                        <span x-show="merging">Merging…</span>
                      </button>
                      <button class="secondary" @click="mergeStep = 'select'" :disabled="merging">Back</button>
                    </div>
                  </div>
                </template>
              </div>
            </template>

          </div><!-- end x-data="donors" -->
        </template>

        <!-- ── Donations ───────────────────────────────────────────────── -->
        <template x-if="!creatingCompany && route === 'donations'">
          <div x-data="donations">

            <!-- List view -->
            <template x-if="view === 'list'">
              <div>
                <div class="page-header">
                  <h1>Donations</h1>
                  <button @click="startCreate">+ New Donation</button>
                </div>
                <div x-show="loading && !donations.length" class="muted">Loading…</div>
                <div x-show="!loading && !donations.length" class="empty-state">No donations yet.</div>
                <table x-show="donations.length > 0">
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Donor</th>
                      <th>Total</th>
                      <th>Payment</th>
                      <th>Rec.</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="don in donations" :key="don.id">
                      <tr>
                        <td x-text="don.date"></td>
                        <td x-text="don.donorName || don.donorId"></td>
                        <td x-text="formatCents(don.totalAmountCents)"></td>
                        <td x-text="paymentMethodName(don.paymentMethodId)"></td>
                        <td>
                          <span x-show="don.hasReceiptable" class="badge receiptable">Yes</span>
                          <span x-show="!don.hasReceiptable" class="badge non-receiptable">No</span>
                        </td>
                        <td>
                          <div class="action-group">
                            <template x-if="!don.locked">
                              <button class="secondary small" @click="startEdit(don)">Edit</button>
                            </template>
                            <template x-if="don.locked">
                              <span class="lock-badge" title="Locked — receipt issued">🔒</span>
                            </template>
                            <button class="secondary small danger" @click="archiveDonation(don)">Archive</button>
                          </div>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
                <div x-show="hasMore" class="load-more">
                  <button class="secondary" @click="loadMore" :disabled="loading">
                    <span x-show="!loading">Load more</span>
                    <span x-show="loading">Loading…</span>
                  </button>
                </div>
              </div>
            </template>

            <!-- Form view -->
            <template x-if="view === 'form'">
              <div class="form-page">
                <div class="page-header">
                  <h1 x-text="formMode === 'create' ? 'New Donation' : 'Edit Donation'"></h1>
                  <button class="secondary" @click="cancelForm">Cancel</button>
                </div>

                <!-- ── Donor ─────────────────────────────────────────── -->
                <div class="donor-search-wrap" @click.outside="closeDonorDropdown">
                  <label>
                    Donor <span class="required">*</span>
                    <input type="text" x-model="donorQuery" @input="onDonorInput"
                           placeholder="Search by name, email, phone…"
                           :class="{ error: formErrors.donorId }"
                           autocomplete="off">
                  </label>
                  <span class="field-error" x-show="formErrors.donorId" x-text="formErrors.donorId"></span>

                  <!-- Search dropdown -->
                  <div class="donor-dropdown" x-show="showDonorDropdown">
                    <template x-for="d in donorResults" :key="d.id">
                      <div class="donor-dropdown-item" @click="selectDonor(d)">
                        <span x-text="donorFullName(d)"></span>
                        <span class="muted" x-text="d.email ? ' — ' + d.email : ''"></span>
                      </div>
                    </template>
                  </div>

                  <div class="donor-search-actions">
                    <span x-show="form.donorId" class="muted donor-selected">
                      ✓ <span x-text="form.donorName"></span>
                    </span>
                    <button type="button" class="link-button" @click="openNewDonorPanel"
                            x-show="!showNewDonorPanel">
                      + New Donor
                    </button>
                  </div>

                  <!-- Inline new-donor panel -->
                  <div class="new-donor-panel" x-show="showNewDonorPanel">
                    <strong>Quick-add donor</strong>
                    <label class="form-type-toggle" style="margin-top:.5rem">
                      <input type="checkbox" x-model="newDonorForm.isOrg" role="switch">
                      Organization
                    </label>
                    <template x-if="!newDonorForm.isOrg">
                      <div class="form-row">
                        <label>
                          First Name <span class="required">*</span>
                          <input type="text" x-model="newDonorForm.firstName"
                                 :class="{ error: newDonorErrors.firstName }">
                          <span class="field-error" x-show="newDonorErrors.firstName"
                                x-text="newDonorErrors.firstName"></span>
                        </label>
                        <label>
                          Last Name <span class="required">*</span>
                          <input type="text" x-model="newDonorForm.lastName">
                        </label>
                      </div>
                    </template>
                    <template x-if="newDonorForm.isOrg">
                      <label>
                        Organization Name <span class="required">*</span>
                        <input type="text" x-model="newDonorForm.orgName"
                               :class="{ error: newDonorErrors.firstName }">
                        <span class="field-error" x-show="newDonorErrors.firstName"
                              x-text="newDonorErrors.firstName"></span>
                      </label>
                    </template>
                    <div class="form-row">
                      <label>Email<input type="email" x-model="newDonorForm.email"></label>
                      <label>Phone<input type="tel" x-model="newDonorForm.phone"></label>
                    </div>
                    <div class="form-actions">
                      <button @click="saveNewDonor" :disabled="savingNewDonor">
                        <span x-show="!savingNewDonor">Add Donor</span>
                        <span x-show="savingNewDonor">Adding…</span>
                      </button>
                      <button class="secondary" @click="cancelNewDonor" :disabled="savingNewDonor">Cancel</button>
                    </div>
                  </div>
                </div>

                <!-- ── Core fields ────────────────────────────────────── -->
                <div class="form-row" style="margin-top:1rem">
                  <label>
                    Date <span class="required">*</span>
                    <input type="date" x-model="form.date" :class="{ error: formErrors.date }">
                    <span class="field-error" x-show="formErrors.date" x-text="formErrors.date"></span>
                  </label>
                  <label>
                    Total Amount <span class="required">*</span>
                    <input type="number" step="0.01" min="0.01" x-model="form.amountDollars"
                           placeholder="0.00" :class="{ error: formErrors.totalAmountCents }">
                    <span class="field-error" x-show="formErrors.totalAmountCents"
                          x-text="formErrors.totalAmountCents"></span>
                  </label>
                </div>
                <div class="form-row">
                  <label>
                    Payment Method <span class="required">*</span>
                    <select x-model="form.paymentMethodId" :class="{ error: formErrors.paymentMethodId }">
                      <option value="">Select…</option>
                      <template x-for="pm in paymentMethods" :key="pm.id">
                        <option :value="pm.id" x-text="pm.name"></option>
                      </template>
                    </select>
                    <span class="field-error" x-show="formErrors.paymentMethodId"
                          x-text="formErrors.paymentMethodId"></span>
                  </label>
                  <label>
                    Reference # (optional)
                    <input type="text" x-model="form.referenceNumber" placeholder="Cheque #, transaction ID…">
                  </label>
                </div>
                <label>
                  Notes (optional)
                  <textarea x-model="form.notes" rows="2" maxlength="2000"></textarea>
                </label>

                <!-- ── Allocation grid ────────────────────────────────── -->
                <div class="alloc-section">
                  <h3 class="alloc-heading">Allocations</h3>
                  <p class="field-error" x-show="typeof formErrors.allocations === 'string'"
                     x-text="formErrors.allocations"></p>

                  <table class="alloc-table">
                    <thead>
                      <tr>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Receiptable</th>
                        <th></th>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="(alloc, idx) in form.allocations" :key="idx">
                        <tr>
                          <td>
                            <select x-model="alloc.categoryId" @change="onCategoryChange(idx)"
                                    :class="{ error: allocationErrorAt(idx, 'categoryId') }">
                              <option value="">Select category…</option>
                              <template x-for="cat in categories" :key="cat.id">
                                <option :value="cat.id" x-text="cat.name"></option>
                              </template>
                            </select>
                            <span class="field-error"
                                  x-show="allocationErrorAt(idx, 'categoryId')"
                                  x-text="allocationErrorAt(idx, 'categoryId')"></span>
                          </td>
                          <td>
                            <input type="number" step="0.01" min="0.01"
                                   x-model="alloc.amountDollars"
                                   placeholder="0.00"
                                   class="alloc-amount"
                                   :class="{ error: allocationErrorAt(idx, 'amountCents') }"
                                   @keydown.enter.prevent="idx === form.allocations.length - 1 && addRow()">
                            <span class="field-error"
                                  x-show="allocationErrorAt(idx, 'amountCents')"
                                  x-text="allocationErrorAt(idx, 'amountCents')"></span>
                          </td>
                          <td class="alloc-rec-cell">
                            <input type="checkbox" :checked="alloc.receiptable" disabled
                                   :title="alloc.receiptable ? 'Receiptable (set by category)' : 'Not receiptable'">
                          </td>
                          <td>
                            <button type="button" class="link-button alloc-remove"
                                    @click="removeRow(idx)"
                                    :disabled="form.allocations.length === 1"
                                    title="Remove row">✕</button>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>

                  <button type="button" class="secondary small" @click="addRow"
                          style="margin-top:.5rem">+ Add allocation</button>
                </div>

                <!-- ── Balance bar ─────────────────────────────────────── -->
                <div class="balance-bar" :class="{ 'balance-ok': isBalanced, 'balance-error': !isBalanced && totalCents > 0 }">
                  <span>Allocated: <strong x-text="formatCents(allocatedCents)"></strong></span>
                  <span class="balance-sep">/</span>
                  <span>Total: <strong x-text="formatCents(totalCents)"></strong></span>
                  <template x-if="!isBalanced && totalCents > 0">
                    <span class="balance-diff">
                      (<span x-text="differenceCents > 0 ? '+' : ''"></span><span
                        x-text="formatCents(differenceCents)"></span>)
                    </span>
                  </template>
                  <template x-if="isBalanced">
                    <span class="balance-check">✓ Balanced</span>
                  </template>
                </div>
                <span class="field-error" x-show="formErrors.balance" x-text="formErrors.balance"></span>

                <!-- ── Batch mode + Save ───────────────────────────────── -->
                <div class="form-actions" style="margin-top:1rem">
                  <button @click="saveDonation"
                          :disabled="saving || !isBalanced || !form.donorId">
                    <span x-show="!saving" x-text="formMode === 'create' ? (batchMode ? 'Save &amp; Next' : 'Save Donation') : 'Save Changes'"></span>
                    <span x-show="saving">Saving…</span>
                  </button>
                  <button class="secondary" @click="cancelForm" :disabled="saving">Cancel</button>
                  <template x-if="formMode === 'create'">
                    <label class="batch-toggle">
                      <input type="checkbox" x-model="batchMode">
                      Batch mode
                    </label>
                  </template>
                </div>
                <p x-show="batchMode" class="muted batch-hint">
                  Batch mode: after saving, the date and payment method are kept. Use for entering multiple donations at once.
                </p>

              </div>
            </template>

          </div><!-- end x-data="donations" -->
        </template>
        <!-- ── Categories ──────────────────────────────────────────────── -->
        <template x-if="!creatingCompany && route === 'categories'">
          <div x-data="categories">

            <!-- List view -->
            <template x-if="view === 'list'">
              <div>
                <div class="page-header">
                  <h1>Categories</h1>
                  <button @click="startCreate">+ New Category</button>
                </div>
                <div x-show="loading && !categories.length" class="muted">Loading…</div>
                <div x-show="!loading && !categories.length" class="empty-state">No categories found.</div>
                <table x-show="categories.length > 0">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Receiptable</th>
                      <th>Status</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="cat in categories" :key="cat.id">
                      <tr>
                        <td x-text="cat.name"></td>
                        <td>
                          <span class="badge" :class="cat.receiptable ? 'receiptable' : 'non-receiptable'"
                            x-text="cat.receiptable ? 'Yes' : 'No'"></span>
                        </td>
                        <td><span class="badge" :class="cat.status" x-text="cat.status"></span></td>
                        <td>
                          <div class="action-group">
                            <button class="secondary small" @click="startEdit(cat)">Edit</button>
                            <template x-if="cat.status === 'active'">
                              <button class="secondary small danger" @click="archiveCategory(cat)">Archive</button>
                            </template>
                            <template x-if="cat.status === 'archived'">
                              <button class="secondary small" @click="unarchiveCategory(cat)">Restore</button>
                            </template>
                          </div>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </template>

            <!-- Form view -->
            <template x-if="view === 'form'">
              <div class="form-page">
                <div class="page-header">
                  <h1 x-text="formMode === 'create' ? 'New Category' : 'Edit Category'"></h1>
                  <button class="secondary" @click="cancelForm">Cancel</button>
                </div>

                <template x-if="formMode === 'edit' && inUseCount > 0">
                  <div class="warning-card">
                    <span x-text="'This category is referenced by ' + inUseCount + ' donation(s).'"></span>
                    <template x-if="lockedUseCount > 0">
                      <strong x-text="' ' + lockedUseCount + ' are locked (receipt issued) — the receiptable flag cannot be changed.'"></strong>
                    </template>
                  </div>
                </template>

                <label>
                  Name <span class="required">*</span>
                  <input type="text" x-model="form.name" :class="{ error: formErrors.name }" maxlength="100">
                  <span class="field-error" x-show="formErrors.name" x-text="formErrors.name"></span>
                </label>

                <div class="form-type-toggle">
                  <label>
                    <input type="checkbox" x-model="form.receiptable" role="switch"
                      :disabled="formMode === 'edit' && lockedUseCount > 0">
                    Tax receiptable
                  </label>
                  <span class="field-error" x-show="formErrors.receiptable" x-text="formErrors.receiptable"></span>
                </div>

                <div class="form-actions">
                  <button @click="saveCategory" :disabled="saving || checkingUse">
                    <span x-show="!saving" x-text="formMode === 'create' ? 'Create Category' : 'Save Changes'"></span>
                    <span x-show="saving">Saving…</span>
                  </button>
                  <button class="secondary" @click="cancelForm" :disabled="saving">Cancel</button>
                </div>
              </div>
            </template>

          </div><!-- end x-data="categories" -->
        </template>

        <!-- ── Payment Methods ─────────────────────────────────────────── -->
        <template x-if="!creatingCompany && route === 'payment-methods'">
          <div x-data="paymentMethods">

            <!-- List view -->
            <template x-if="view === 'list'">
              <div>
                <div class="page-header">
                  <h1>Payment Methods</h1>
                  <button @click="startCreate">+ New Payment Method</button>
                </div>
                <div x-show="loading && !items.length" class="muted">Loading…</div>
                <div x-show="!loading && !items.length" class="empty-state">No payment methods found.</div>
                <table x-show="items.length > 0">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Status</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="item in items" :key="item.id">
                      <tr>
                        <td x-text="item.name"></td>
                        <td><span class="badge" :class="item.status" x-text="item.status"></span></td>
                        <td>
                          <div class="action-group">
                            <button class="secondary small" @click="startEdit(item)">Edit</button>
                            <template x-if="item.status === 'active'">
                              <button class="secondary small danger" @click="archiveItem(item)">Archive</button>
                            </template>
                            <template x-if="item.status === 'archived'">
                              <button class="secondary small" @click="unarchiveItem(item)">Restore</button>
                            </template>
                          </div>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </template>

            <!-- Form view -->
            <template x-if="view === 'form'">
              <div class="form-page">
                <div class="page-header">
                  <h1 x-text="formMode === 'create' ? 'New Payment Method' : 'Edit Payment Method'"></h1>
                  <button class="secondary" @click="cancelForm">Cancel</button>
                </div>

                <label>
                  Name <span class="required">*</span>
                  <input type="text" x-model="form.name" :class="{ error: formErrors.name }" maxlength="100">
                  <span class="field-error" x-show="formErrors.name" x-text="formErrors.name"></span>
                </label>

                <div class="form-actions">
                  <button @click="saveItem" :disabled="saving">
                    <span x-show="!saving" x-text="formMode === 'create' ? 'Create Payment Method' : 'Save Changes'"></span>
                    <span x-show="saving">Saving…</span>
                  </button>
                  <button class="secondary" @click="cancelForm" :disabled="saving">Cancel</button>
                </div>
              </div>
            </template>

          </div><!-- end x-data="paymentMethods" -->
        </template>
        <template x-if="!creatingCompany && route === 'reports'">
          <div><h1>Reports</h1><p class="muted">Coming in Phase 6.</p></div>
        </template>
        <template x-if="!creatingCompany && route === 'receipts'">
          <div><h1>Receipts</h1><p class="muted">Coming in Phase 7.</p></div>
        </template>
        <template x-if="!creatingCompany && route === 'settings'">
          <div><h1>Settings</h1><p class="muted">Coming in Phase 7.</p></div>
        </template>
      </section>
    </div>
  </div>

  <script>
    const styleEl = document.createElement("style");
    styleEl.textContent = "[x-cloak] { display: none !important; }";
    document.head.appendChild(styleEl);
  </script>
</body>
</html>
